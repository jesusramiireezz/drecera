<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Firma DRECERA</title>
  </head>

  <body style="margin:0; padding:32px; background:#f2f0e9;">
    <table
      cellpadding="0"
      cellspacing="0"
      role="presentation"
      style="
        width:100%;
        max-width:620px;
        border-collapse:collapse;
        font-family:Satoshi, Arial, Helvetica, sans-serif;
      "
    >
      <tr>
        <td
          valign="top"
          style="
            position:relative;
            overflow:hidden;
            height:205px;
            padding:0 32px;
            background:#050505;
            color:#f2f0e9;
            vertical-align:top;
          "
        >
          <!-- DRECERA FONDO -->
          <div
            style="
              position:absolute;
              left:22px;
              bottom:2px;
              z-index:0;
              font-size:88px;
              line-height:0.9;
              font-weight:800;
              letter-spacing:-0.065em;
              color:#0c0c0c;
              white-space:nowrap;
            "
          >
            DRECERA
          </div>

          <!-- CONTENIDO -->
          <table
            cellpadding="0"
            cellspacing="0"
            role="presentation"
            style="
              position:relative;
              z-index:1;
              width:100%;
              border-collapse:collapse;
            "
          >
            <tr>
              <!-- IZQUIERDA -->
              <td
                valign="top"
                style="
                  vertical-align:top;
                  padding-top:24px;
                "
              >
                <img
                  src="https://somdrecera.com/favicon.png"
                  width="42"
                  height="42"
                  alt="DRECERA"
                  style="
                    display:block;
                    width:42px;
                    height:42px;
                    border:0;
                    position:relative;
                    top:-5px;
                  "
                />

                <div
                  style="
                    margin-top:10px;
                    font-size:24px;
                    line-height:1;
                    font-weight:700;
                    letter-spacing:-0.04em;
                    color:#f2f0e9;
                  "
                >
                  Jesús Ramírez
                </div>

                <div
                  style="
                    margin-top:6px;
                    max-width:390px;
                    font-size:13px;
                    line-height:1.4;
                    color:#999894;
                  "
                >
                  Automatización, integraciones y soluciones a medida.
                </div>
              </td>

              <!-- DERECHA -->
              <td
                valign="top"
                style="
                  vertical-align:top;
                  text-align:right;
                  white-space:nowrap;
                  padding-top:24px;
                "
              >
                <div
                  style="
                    font-size:12px;
                    line-height:1.7;
                    color:#999894;
                  "
                >
                  <a
                    href="https://somdrecera.com"
                    style="
                      color:#f2f0e9;
                      text-decoration:none;
                      font-weight:700;
                    "
                  >
                    somdrecera.com
                  </a>

                  <br />

                  <a
                    href="mailto:contacto@somdrecera.com"
                    style="
                      color:#999894;
                      text-decoration:none;
                    "
                  >
                    contacto@somdrecera.com
                  </a>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
